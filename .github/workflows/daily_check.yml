name: Электрондық журнал тексеру

on:
  schedule:
    - cron: '0 16 * * *'   # 21:00 Актау (UTC+5)
  workflow_dispatch:        # ручной запуск для теста

jobs:
  check-journals:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Репозиторий жүктеу
        uses: actions/checkout@v4

      - name: Python 3.11 орнату
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Зависимости орнату
        run: pip install requests beautifulsoup4 python-docx

      - name: Журналдарды тексеру
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEACHERS_JSON:    ${{ secrets.TEACHERS_JSON }}
        run: python check_runner.py

      - name: Қате болса хабарлау
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="❌ GitHub Actions қатемен аяқталды! github.com → Actions → Logs" \
            -d parse_mode="HTML"
